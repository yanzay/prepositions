name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Structural validation (errors block build)
        run: python3 validate_anki_data.py
      - name: Quality lint (errors block; warnings reported)
        run: python3 lint_anki_data.py
      - name: Trailing whitespace check
        run: |
          if grep -nP '[ \t]+$' prepositions_*.txt; then
            echo "Trailing whitespace found"; exit 1
          fi
      - name: Smoke-build the apkg (no media)
        run: python3 build_anki_package.py --no-media
